name: "CI/CD — medimesh-user"
run-name: "medimesh-user — ${{ github.event.head_commit.message }} (${{ github.sha }})"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  
  # Stage 1: SonarQube Code Quality Analysis
  sonarqube:
    uses: Medimesh-grp3/ci-templates/.github/workflows/template-sonarqube.yml@main
    with:
      service_name: medimesh-user
      service_path: .
      sonar_project_key: medimesh-user
    secrets:
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONARQUBE_URL:   ${{ secrets.SONARQUBE_URL }}
      SMTP_USERNAME:   ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL:     ${{ secrets.ALERT_EMAIL }}

  # Stage 2: Build Dependencies & Snyk Security Scan
  build-snyk:
    needs: sonarqube
    uses: Medimesh-grp3/ci-templates/.github/workflows/template-build-snyk.yml@main
    with:
      service_name: medimesh-user
      service_path: .
      node_version: "20"
    secrets:
      SNYK_TOKEN:    ${{ secrets.SNYK_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL:   ${{ secrets.ALERT_EMAIL }}

  # Stage 3: Docker Build + Trivy Scan + Push to DockerHub
  docker:
    needs: build-snyk
    uses: Medimesh-grp3/ci-templates/.github/workflows/template-docker.yml@main
    with:
      service_name:      medimesh-user
      service_path:      .
      docker_image_name: medimesh_medimesh-user
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
      SMTP_USERNAME:      ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}

  # Stage 4: CD — Update ArgoCD repo → ArgoCD auto-deploys
  deploy:
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: Medimesh-grp3/ci-templates/.github/workflows/template-cd.yml@main
    with:
      service_name: medimesh-user
      values_key:   user
      image_tag:    ${{ needs.docker.outputs.version }}
    secrets:
      MANIFEST_REPO_PAT: ${{ secrets.MANIFEST_REPO_PAT }}
      SMTP_USERNAME:     ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL:       ${{ secrets.ALERT_EMAIL }}

  # Final: Success notification
  notify-success:
    name: "✅ Pipeline Complete — medimesh-user"
    runs-on: ubuntu-latest
    needs: [sonarqube, build-snyk, docker, deploy]
    if: |
      always() &&
      needs.docker.result == 'success' &&
      github.event_name != 'pull_request'
    steps:
      - name: Send Success Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ MediMesh CI/CD Passed — medimesh-user (${{ needs.docker.outputs.version }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI/CD Pipeline
          body: |
            ════════════════════════════════════════════════════════
            ✅ MediMesh CI/CD Pipeline — ALL STAGES PASSED
            ════════════════════════════════════════════════════════
            Service : medimesh-user
            Version : ${{ needs.docker.outputs.version }}
            Branch  : ${{ github.ref_name }}
            Commit  : ${{ github.sha }}
            Author  : ${{ github.actor }}
            ────────────────────────────────────────────────────────
            ✅ ① SonarQube — Code quality passed
            ✅ ② Build     — Dependencies installed
            ✅ ③ Snyk      — Security scan done
            ✅ ④ Docker    — Image built
            ✅ ⑤ Trivy     — Container scanned
            ✅ ⑥ Push      — Image on DockerHub
            ✅ ⑦ CD        — ArgoCD manifest updated
            ────────────────────────────────────────────────────────
            Image: ${{ secrets.DOCKERHUB_USERNAME }}/medimesh_medimesh-user:${{ needs.docker.outputs.version }}
            ArgoCD is now deploying to cluster automatically.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ════════════════════════════════════════════════════════
